<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Авторизация</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="page">
    <div class="container">
        <div class="navbar">
            <h1>Авторизация</h1>
            <div class="actions">
                <a class="button-link button-secondary" href="index.html">На главную</a>
                <a class="button-link button-secondary" href="register.html">К регистрации</a>
            </div>
        </div>

        <label for="email">Email</label>
        <input id="email" type="email" placeholder="player@example.com">

        <label for="password">Пароль</label>
        <input id="password" type="password" placeholder="123456">

        <div class="actions">
            <button id="loginBtn">Войти</button>
        </div>

        <div class="card">
            <h3>Текущий JWT</h3>
            <div id="tokenBox" class="token-box">Токен не сохранён</div>
        </div>

        <div class="card">
            <h3>Ответ сервера</h3>
            <pre id="responseBox">Здесь появится результат авторизации...</pre>
        </div>
    </div>
</div>

<script src="app.js"></script>
<script>
renderToken("tokenBox");

document.getElementById("loginBtn").addEventListener("click", async () => {
    const body = {
        email: document.getElementById("email").value.trim(),
        password: document.getElementById("password").value
    };

    const result = await apiRequest("/auth/login", "POST", body, false);

    if (result.data && result.data.ok && result.data.data && result.data.data.accessToken) {
        saveToken(result.data.data.accessToken);
        renderToken("tokenBox");
    }

    renderResponse("responseBox", "POST /auth/login", result);
});
</script>
</body>
</html>
